<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome — PL Tracker</title>
    <link rel="stylesheet" href="welcome.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <img src="../icons/icon128.png" class="logo" alt="" />
        <div class="title-row">
          <h1>Better PrairieLearn</h1>
        </div>
        <p class="subtitle">Your PrairieLearn, your way.</p>

        <div class="options-section">
          <p class="section-label">Options</p>
          <label class="toggle-row" for="classicBadgesToggle">
            <span class="toggle-label">
              <span class="toggle-title">Classic badge style</span>
              <span class="toggle-desc">Restore the pre-2025 solid-color assessment badges on PrairieLearn pages</span>
            </span>
            <span class="toggle-track">
              <input type="checkbox" id="classicBadgesToggle" />
              <span class="toggle-thumb"></span>
            </span>
          </label>
        </div>

        <button class="btn-primary" id="startBtn">Get Started</button>
      </div>
    </div>
    <script src="welcome.js"></script>
  </body>
</html>
